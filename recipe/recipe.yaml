# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  # source-of-truth
  version: "1.13.5"
  # derived
  patch_version: ${{ (version | split('.'))[2] }}
  dagster_libs_version: 0.29.${{ patch_version }}
  # convenience
  pip_install: -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

recipe:
  name: dagster-meta
  version: ${{ version }}

build:
  noarch: python
  number: 0

outputs:
  # deps of dagster
  - package:
      name: dagster-pipes
    source:
      url: https://pypi.org/packages/source/d/dagster-pipes/dagster_pipes-${{ version }}.tar.gz
      sha256: a2173b2b733be5a394d03b8ad12b7ca92c9b317fa895fbe88758aeff0e85f18b
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_pipes
          pip_check: true
          python_version: ${{ python_min }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-pipes
      license: Apache-2.0
      license_file: LICENSE
      summary: Toolkit for Dagster integrations with transform logic outside of Dagster

  - package:
      name: dagster-shared
    source:
      url: https://pypi.org/packages/source/d/dagster-shared/dagster_shared-${{ version }}.tar.gz
      sha256: fbb66adc5f03a4053dbc740c23751fa3ab5359cbb6620c61aa327c8c22455f25
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - packaging >=20.9
        - platformdirs
        - pydantic >=2,<3.0.0
        - python >=${{ python_min }}
        - pyyaml >=5.1
        - tomlkit
        - typing_extensions >=4.11.0,<5
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_shared
          pip_check: true
          python_version: ${{ python_min }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/librariees/dagster-shared
      license: Apache-2.0
      license_file: LICENSE
      summary: Shared code between dagster and dagster-dg.

  # dagster itself
  - package:
      name: dagster
    source:
      url: https://pypi.org/packages/source/d/dagster/dagster-${{ version }}.tar.gz
      sha256: dbcf850a7e70aab5003574ad92b87ea9df2bf1278f13dd8f9872a65f30f664f1
    build:
      number: 0
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagster = dagster._cli:main
          - dagster-daemon = dagster._daemon.cli:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-pipes", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-shared", upper_bound="x.x.x") }}
        - alembic >=1.2.1,!=1.6.3,!=1.7.0,!=1.11.0
        - antlr-python-runtime
        - click >=5.0,<9.0
        - coloredlogs >=6.1,<=14.0
        - docstring_parser
        - filelock
        - jinja2
        - psutil >=1.0
        - python >=${{ python_min }}
        - python-dotenv
        - python-tzdata
        - pytz
        - pywin32-on-windows
        - requests
        - rich
        - six
        - sqlalchemy >=1.0,<3
        - structlog
        - tabulate
        - tomli <3
        - toposort >=1.0
        - tqdm <5
        - watchdog >=0.8.3,<7
        - if: match(python_min, "<3.13")
          then: grpcio >=1.44.0
        - if: match(python_min, ">=3.13")
          then: grpcio >=1.66.2
        - if: match(python_min, "<3.13")
          then: grpcio-health-checking >=1.44.0
        - if: match(python_min, ">=3.13")
          then: grpcio-health-checking >=1.66.2
        - if: match(python_min, "<3.11")
          then: protobuf >=3.20.0,<7
        - if: match(python_min, ">=3.11")
          then: protobuf >=4,<7
        - if: match(python_min, ">=3.12")
          then: universal_pathlib >=0.2.0
        - if: match(python_min, "<3.12")
          then: universal_pathlib
      run_constraints:
        - python ${{ python_min }}.*
        - pywin32 !=226
    tests:
      - python:
          imports:
            - dagster
            - dagster.components.core
          pip_check: true
          python_version: ${{ python_min }}.*
      - script:
          - dagster --help
          - dagster-daemon --help
    about:
      homepage: https://github.com/dagster-io/dagster
      license: Apache-2.0
      summary: The data orchestration platform built for productivity.
      documentation: https://dagster.readthedocs.io
      license_file: LICENSE
      description: |
        Dagster lets you define pipelines in terms of the data flow between reusable, logical components,
        then test locally and run anywhere. With a unified view of pipelines and the assets they produce,
        Dagster can schedule and orchestrate Pandas, Spark, SQL, or anything else that Python can invoke.

        Dagster is designed for data platform engineers, data engineers, and full-stack data scientists.
        Building a data platform with Dagster makes your stakeholders more independent and your systems
        more robust. Developing data pipelines with Dagster makes testing easier and deploying faster.

  # other things that use the main `version`
  - package:
      name: create-dagster
    source:
      url: https://pypi.org/packages/source/c/create-dagster/create_dagster-${{ version }}.tar.gz
      sha256: 170999ca45264ccdd409479e443b97203e060b0564e0552bab6004c6f1fece3e
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - create-dagster = create_dagster.cli:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-dg-core", upper_bound="x.x.x") }}
        - python >=${{ python_min }}
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: create_dagster
          pip_check: true
          python_version: ${{ python_min }}.*
      - script:
          - create-dagster --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/create-dagster
      license: Apache-2.0
      license_file: LICENSE
      summary: CLI for creating a new dg project or workspace.

  - package:
      name: dagster-cloud-cli
    source:
      url: https://pypi.org/packages/source/d/dagster-cloud-cli/dagster_cloud_cli-${{ version }}.tar.gz
      sha256: 7c292c88de855862f595ad0259909cbebef2636b0b305dcddbbe4181f500534f
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagster-cloud = dagster_cloud_cli.entrypoint:app
          - dagster-plus = dagster_cloud_cli.entrypoint:app
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-shared", upper_bound="x.x.x") }}
        - click
        - github3.py
        - jinja2
        - packaging >=20.9
        - python >=${{ python_min }}
        - pyyaml >=5.1
        - questionary
        - requests
        - setuptools
        - typer >=0.15.0
        - validators
        - if: match(python_min, "<3.11")
          then: tomli >=1.1.0
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_cloud_cli
          pip_check: true
          python_version: ${{ python_min }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagster-cloud --help
          - dagster-plus --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-cloud-cli
      license: Apache-2.0
      license_file: LICENSE
      summary: Command line interface for Dagster Cloud

  - package:
      name: dagster-dg-cli
    source:
      url: https://pypi.org/packages/source/d/dagster-dg-cli/dagster_dg_cli-${{ version }}.tar.gz
      sha256: e6ddd9c15d5560b974112f894d2099db0558ebaa144a04c38f689957b236fe3c
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dg = dagster_dg_cli.cli:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-cloud-cli", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-dg-core", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-rest-resources", upper_bound="x.x.x") }}
        - python >=${{ python_min }}
        - typer
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_dg_cli
          pip_check: true
          python_version: ${{ python_min }}.*
      - script:
          - dg --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dg-cli
      license: Apache-2.0
      license_file: LICENSE
      summary: Experimental API for scaffolding Dagster projects and components. Includes the dg CLI tool.

  - package:
      name: dagster-dg-core
    source:
      url: https://pypi.org/packages/source/d/dagster-dg-core/dagster_dg_core-${{ version }}.tar.gz
      sha256: 45f812ecca12908efd8aae239cc17315ddd8744efe2a2002f67830666b729b18
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-cloud-cli", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-shared", upper_bound="x.x.x") }}
        - click >=8,<9
        - click-aliases
        - gql-with-requests
        - jinja2
        - jsonschema
        - markdown
        - packaging
        - python >=${{ python_min }}
        - python-dotenv
        - pyyaml >=5.1
        - rich
        - setuptools
        - tomlkit <0.13.3
        - typer >=0.15.1,<1.0
        - typing_extensions >=4.4.0,<5
        - watchdog
        - yaspin
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_dg_core
          pip_check: true
          python_version: ${{ python_min }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dg-core
      license: Apache-2.0
      license_file: LICENSE
      summary: Core libraries for the dagster-dg-cli and create-dagster packages.

  - package:
      name: dagster-graphql
    source:
      url: https://pypi.org/packages/source/d/dagster-graphql/dagster_graphql-${{ version }}.tar.gz
      sha256: 03458f2ccf485d8e1c5ab676f7b77218be575f21ccebdc20ac088359c58b6464
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagster-graphql = dagster_graphql.cli:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster", upper_bound="x.x.x") }}
        - gql-with-requests >=3,<5
        - graphene >=3,<4
        - python >=${{ python_min }}
        - requests
        - starlette
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports:
            - dagster_graphql
            - dagster_graphql.client
            - dagster_graphql.schema
          pip_check: true
          python_version: ${{ python_min }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagster-graphql --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-graphql
      license: Apache-2.0
      license_file: LICENSE
      summary: The GraphQL frontend to python dagster.

  - package:
      name: dagster-rest-resources
      version: ${{ dagster_libs_version }}
    source:
      url: https://pypi.org/packages/source/d/dagster-rest-resources/dagster_rest_resources-${{ dagster_libs_version }}.tar.gz
      sha256: 8c1c5afe3ed83e5c6e02cd40d879be9e0d0e6c7e876c43e678311c064d0ffc7c
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-shared", upper_bound="x.x.x") }}
        - httpx >=0.27.0
        - pydantic >=2.12.5
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_rest_resources
          pip_check: true
          python_version: ${{ python_min }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-rest-resources
      license: Apache-2.0
      license_file: LICENSE
      summary: Dagster functionality as REST-style resources

  - package:
      name: dagster-webserver
    source:
      url: https://pypi.org/packages/source/d/dagster-webserver/dagster_webserver-${{ version }}.tar.gz
      sha256: 496d9f3bfbbb6d58df52f33e256d6f7d0239c6177cf07f3a8a6b2e7cf599a651
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagster-webserver = dagster_webserver.cli:main
          - dagster-webserver-debug = dagster_webserver.debug:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster", upper_bound="x.x.x") }}
        - ${{ pin_subpackage("dagster-graphql", upper_bound="x.x.x") }}
        - click >=7.0,<9.0
        - python >=${{ python_min }}
        - starlette !=0.36.0
        - uvicorn-standard
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagster_webserver
          pip_check: true
          python_version: ${{ python_min }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagster-webserver --help
          - dagster-webserver-debug --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-webserver
      license: Apache-2.0
      license_file: LICENSE
      summary: Web UI for dagster.

  - package:
      name: dagit
    source:
      url: https://pypi.org/packages/source/d/dagit/dagit-${{ version }}.tar.gz
      sha256: de2cd2b7d71dc0804087aa5106cbac635ee129f4d011fc6d1bcadcd0a59c49ce
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagit = dagster_webserver.cli:main
          - dagit-debug = dagster_webserver.debug:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster-webserver", upper_bound="x.x.x") }}
        - python >=${{ python_min }}
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      - python:
          imports: dagit
          pip_check: true
          python_version: ${{ python_min }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagit --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagit
      license: Apache-2.0
      license_file: LICENSE
      summary: Dagster UI

  - package:
      name: dagster-airflow
    source:
      url: https://pypi.org/packages/source/d/dagster-airflow/dagster_airflow-${{ version }}.tar.gz
      sha256: 607662af138225fb24253d1d7ee28a3ab54d922dde527c7c02fbb425dd9edab1
    build:
      noarch: python
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage("dagster", upper_bound="x.x.x") }}
        - lazy-object-proxy
        - python >=${{ python_min }}
        - setuptools <71.0.0
        - if: match(python_min, ">=3.12")
          then: pendulum >=3
        - if: match(python_min, "<3.12")
          then: pendulum
      run_constraints:
        - python ${{ python_min }}.*
    tests:
      # not-yet-available-on-conda-forge
      - if: not match(python_min, ">=3.13")
        then:
          requirements:
            run:
              - pip
              # errors with:
              ##  >>> from airflow.hooks.base_hook import BaseHook
              ##  ModuleNotFoundError: No module named 'airflow.hooks.base_hook'
              - airflow <3
              # apache-airflow-providers-fab 2.4.4 has requirement apache-airflow>=3.0.2, but you have apache-airflow 2.11.0.
              - apache-airflow-providers-fab <2
              - python ${{ python_min }}.*
          script:
            - pip check
            - python -c "import dagster_airflow"
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-airflow
      license: Apache-2.0
      license_file: LICENSE
      summary: Airflow plugin for Dagster

about:
  homepage: https://github.com/dagster-io
  summary: The data orchestration platform built for productivity.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://dagster.readthedocs.io
  description: >-
    Dagster is a system for building modern data applications. Combining an elegant programming model and beautiful tools, Dagster allows infrastructure engineers, data engineers, and data scientists to seamlessly collaborate to process and produce the trusted, reliable data needed in today's world.

extra:
  feedstock-name: dagster
  recipe-maintainers:
    - xhochy
    - bollwyvl
    - mgasner
